default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  password: database
  host: localhost
  port: 5432




development:
  <<: *default
  database: article_portal_development



test:
  <<: *default
  database: article_portal_test



production:
  primary: &primary_production
    <<: *default
    database: article_portal_production
    username: article_portal
    password: <%= ENV["ARTICLE_PORTAL_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: article_portal_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: article_portal_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: article_portal_production_cable
    migrations_paths: db/cable_migrate
